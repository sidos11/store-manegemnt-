name: store_management
description: "A new Flutter project for SMS Store Management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  intl: ^0.20.2
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true # <-- يجب أن يكون بمحاذاة الفراغات الصحيحة تحت flutter
  uses-material-design: true

  assets:
    - assets/images/

